services:
  - type: web
    name: nextask-backend
    runtime: node
    rootDir: nextask/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
    autoDeploy: true
